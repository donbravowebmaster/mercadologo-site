<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mercadologo - Tu Marketplace</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <h1>🏪 Mercadologo</h1>
      <ul>
        <li><a href="#inicio">Inicio</a></li>
        <li><a href="#productos">Productos</a></li>
        <li><a href="#contacto">Contacto</a></li>
      </ul>
    </div>
  </nav>

  <header id="inicio" class="hero">
    <div class="container">
      <h1>Bienvenido a Mercadologo</h1>
      <p>Tu marketplace de confianza</p>
      <button class="btn-primary">Comenzar</button>
    </div>
  </header>

  <section id="productos" class="products">
    <div class="container">
      <h2>Nuestros Productos</h2>
      <div class="product-grid">
        <div class="product-card">
          <img src="/img/placeholder.png" alt="Producto 1">
          <h3>Producto 1</h3>
          <p>$99.99</p>
        </div>
        <div class="product-card">
          <img src="/img/placeholder.png" alt="Producto 2">
          <h3>Producto 2</h3>
          <p>$149.99</p>
        </div>
        <div class="product-card">
          <img src="/img/placeholder.png" alt="Producto 3">
          <h3>Producto 3</h3>
          <p>$199.99</p>
        </div>
      </div>
    </div>
  </section>

  <footer id="contacto">
    <div class="container">
      <p>&copy; 2026 Mercadologo. Todos los derechos reservados.</p>
      <p>Email: info@mercadologo.com</p>
    </div>
  </footer>

  <script src="/js/main.js"></script>
</body>
</html>
